[general]
# Configure the dedicated CORS options
cors-allow-origins = "*"
cors-allow-headers = "Content-Type, Authorization"


# Use the advanced headers section for any headers that don't have a
# dedicated option in the [general] section.
[[advanced.headers]]
# The 'source' is a glob pattern. "**/*" applies the headers to ALL files.
source = "**/*"

# Define the custom headers here
[advanced.headers.headers]
Access-Control-Allow-Methods = "GET, POST, OPTIONS"
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Embedder-Policy = "require-corp"
