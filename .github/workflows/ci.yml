name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  test-linux:
    name: Tests (Linux Container)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - uses: actions/checkout@v7

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Check typos
        run: typos

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check for unused dependencies
        run: cargo shear

      - name: Run tests
        run: cargo test

      # - name: Verify licenses matching committed ones
      #   run: |
      #     git config --global --add safe.directory "*"
      #     if ! command -v cargo-about &> /dev/null; then
      #       echo "cargo-about not found, installing..."
      #       pacman -Syu --noconfirm cargo-about
      #     fi
      #     ./scripts/generate_licenses.sh
      #     git diff --exit-code assets/

  test-macos:
    name: Tests (macOS Native)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Compile optimized release binary
        run: cargo build --release

      - name: Stage Artifact
        run: |
          mkdir -p staging
          cp target/release/ai-token-cost-estimator staging/ai-token-cost-estimator-linux-x86_64

      - name: Upload Asset as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-token-cost-estimator-linux-x86_64
          path: staging/ai-token-cost-estimator-linux-x86_64

  build-windows:
    name: Build & Package Windows (Inno Setup)
    runs-on: windows-latest
    needs: [test-linux, test-macos]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          target: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Compile optimized release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Restructure Build Path
        run: |
          mkdir -Force target\release
          cp -Force target\x86_64-pc-windows-msvc\release\ai-token-cost-estimator.exe target\release\ai-token-cost-estimator.exe

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          # 1. Extract the version string from Cargo.toml
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.*?)"').Matches.Groups[1].Value
          echo "Detected Cargo Version: $version"

          # 2. Compile passing the version dynamically
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Prepare Portable ZIP
        run: |
          compress-archive -Path target\release\ai-token-cost-estimator.exe -DestinationPath staging\ai-token-cost-estimator-windows-portable-x86_64.zip

      - name: Upload Portable ZIP as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-token-cost-estimator-windows-portable-x86_64.zip
          path: staging\ai-token-cost-estimator-windows-portable-x86_64.zip

      - name: Upload Installer as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-token-cost-estimator-setup-x86_64.exe
          path: staging\ai-token-cost-estimator-setup-x86_64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [test-linux, test-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile optimized release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage Artifact
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ai-token-cost-estimator staging/ai-token-cost-estimator-macos-${{ matrix.target }}

      - name: Upload Asset as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-token-cost-estimator-macos-${{ matrix.target }}
          path: staging/ai-token-cost-estimator-macos-${{ matrix.target }}

  build-wasm32:
    name: Build WASM32
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen &> /dev/null; then
            echo "wasm-bindgen not found, installing..."
            pacman -Syu --noconfirm wasm-bindgen
          fi

      - name: Compile optimized WASM binary and package
        run: |
          cargo build --release --bin ai-token-cost-estimator --target wasm32-unknown-unknown
          rm -rf out
          mkdir -p out
          wasm-bindgen --no-typescript --target web --out-dir ./out/ --out-name "ai_token_cost_estimator" ./target/wasm32-unknown-unknown/release/ai-token-cost-estimator.wasm
          wasm-opt --enable-bulk-memory --enable-threads --enable-nontrapping-float-to-int --enable-simd --enable-multivalue -O4 -ol 100 -s 100 -o out/output.wasm out/ai_token_cost_estimator_bg.wasm && mv out/output.wasm out/ai_token_cost_estimator_bg.wasm || echo "wasm-opt not found or failed, skipping optimization"
          cp index.html out/index.html
          cp _headers out/_headers
          cp favicon.png out/favicon.png

      - name: Upload Pages Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: Upload Asset as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-token-cost-estimator-wasm
          path: out/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-wasm32
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
